<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passion Moto</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #111, #222);
            color: white;
            text-align: center;
        }

        header {
            padding: 80px;
            background: url("https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=1600&auto=format&fit=crop") center center / cover no-repeat;
        }

        h1 {
            font-size: 70px;
            margin: 0;
            color: orange;
            text-shadow: 3px 3px 15px black;
        }

        h2 {
            margin-top: 30px;
            color: #ffcc00;
            font-size: 40px;
        }

        p {
            width: 80%;
            margin: 20px auto;
            line-height: 1.8;
            font-size: 20px;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 50px;
        }

        .gallery img {
            width: 350px;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 0 25px black;
            transition: 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px orange;
        }

        a {
            display: inline-block;
            margin: 30px;
            padding: 15px 30px;
            background: orange;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }

        a:hover {
            background: white;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <header>
        <h1>🏍️ Univers Moto 🏍️</h1>
    </header>

    <h2>Les plus belles motos sportives</h2>

    <p>
        Les motos sportives sont synonymes de vitesse, de puissance et d’adrénaline.
        Que ce soit sur route ou sur circuit, elles offrent des sensations incroyables
        grâce à leurs moteurs performants et leur design agressif.
    </p>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1517846693594-1567da72af75?q=80&w=1200&auto=format&fit=crop" alt="Moto sportive">
        
        <img src="https://images.unsplash.com/photo-1558980664-10ea292d6d89?q=80&w=1200&auto=format&fit=crop" alt="Moto noire">
        
        <img src="https://images.unsplash.com/photo-1529429617124-aee711a5ac1c?q=80&w=1200&auto=format&fit=crop" alt="Moto rapide">
    </div>

    <a href="https://www.youtube.com/results?search_query=moto+sportive" target="_blank">
        Voir des vidéos de motos
    </a>

</body>
</html>
</html>
